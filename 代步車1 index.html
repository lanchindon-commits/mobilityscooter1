<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代步車借出登記系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .form-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
        }
        .readonly-input {
            background-color: #f9fafb;
            color: #6b7280;
            cursor: not-allowed;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 拍照上傳區塊 */
        #photo-upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }
        #photo-upload-area:hover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        #photo-upload-area.has-image {
            border-color: #16a34a;
            background-color: #f0fdf4;
            padding: 0.5rem;
        }
        #photoInput {
            display: none;
        }
        #preview-img {
            max-height: 200px;
            border-radius: 0.5rem;
            margin: 0 auto;
            display: none;
        }
        #upload-placeholder {
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md">

        <!-- 載入中遮罩 -->
        <div id="loading-overlay" class="text-center py-10">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-gray-500">正在安全連線 LINE 系統...</p>
        </div>

        <!-- 表單主要內容 -->
        <div id="form-container" class="form-card p-8 hidden">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">代步車登記系統</h1>
                <p class="text-gray-500 mt-2">請確認資訊並完成登記</p>
            </div>
            <form id="reservationForm" class="space-y-5">
                <input type="hidden" id="lineUserId" name="lineUserId">

                <!-- 1. 登記日期 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">登記日期</label>
                    <input type="text" id="todayDate" name="todayDate" readonly
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 readonly-input outline-none">
                </div>

                <!-- 2. 原車車牌 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">您的車牌號碼 (原車)</label>
                    <input type="text" id="customerPlate" name="customerPlate" required
                        placeholder="例如: ABC-1234"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all uppercase">
                </div>

                <!-- 3. 代步車車牌 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">借出之代步車車牌</label>
                    <input type="text" id="loanerPlate" name="loanerPlate" required
                        placeholder="例如: EB2-567"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all uppercase">
                </div>

                <!-- 4. 店家選擇 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">取車店家</label>
                    <select id="storeName" name="storeName" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                        <option value="" disabled selected>請選擇店家</option>
                        <option value="金旺昇">金旺昇</option>
                        <option value="忍店">忍店</option>
                        <option value="金力盛">金力盛</option>
                    </select>
                </div>

                <!-- 5. 證件拍照上傳 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        證件照片
                        <span class="text-red-500">*</span>
                    </label>
                    <!-- 隱私說明 -->
                    <div class="flex items-start gap-2 mb-2 p-2 bg-amber-50 border border-amber-200 rounded-lg">
                        <svg class="w-4 h-4 text-amber-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        <p class="text-xs text-amber-700">請拍攝<strong>駕照</strong>或<strong>健保卡</strong>，僅用於借用代步車之身份確認，完成後即刪除。</p>
                    </div>
                    <!-- 拍照區域 -->
                    <div id="photo-upload-area" onclick="document.getElementById('photoInput').click()">
                        <div id="upload-placeholder">
                            <svg class="w-10 h-10 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <p class="text-sm text-gray-500 font-medium">點此拍照或選取圖片</p>
                            <p class="text-xs text-gray-400 mt-1">支援相機拍攝 / 相簿選取</p>
                        </div>
                        <img id="preview-img" src="" alt="證件預覽">
                    </div>
                    <!-- 隱藏的 file input，accept 同時允許相機拍攝與相簿 -->
                    <input type="file" id="photoInput" accept="image/*" capture="environment">
                    <p id="photo-error" class="text-xs text-red-500 mt-1 hidden">請上傳證件照片</p>
                </div>

                <!-- 提交按鈕 -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-200 flex justify-center items-center mt-4">
                    <span>確認送出</span>
                </button>
            </form>
        </div>

        <!-- 成功回饋畫面 -->
        <div id="success-container" class="form-card p-8 text-center hidden">
            <div class="mb-4 flex justify-center">
                <div class="bg-green-100 p-3 rounded-full">
                    <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">登記成功！</h2>
            <p class="text-gray-600 mb-6">資料已成功傳送，LINE 聊天室已收到確認訊息。</p>
            <button onclick="liff.closeWindow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-md">
                關閉並返回
            </button>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2009551033-j7lWjkjJ';
        const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/qdlgd8r67hh42uxq99z1cjmw2tp3neyq';

        let photoBase64 = null; // 儲存 raw base64（不含 data URL 前綴）

        // ── LIFF 初始化 ──
        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('lineUserId').value = profile.userId;
                    setupForm();
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
                document.getElementById('loading-overlay').innerHTML = `
                    <div class="p-4 bg-red-50 text-red-600 rounded-lg">
                        <p class="font-bold">連線失敗</p>
                        <p class="text-sm">請在 LINE App 內開啟此網址，或檢查 LIFF ID 是否正確。</p>
                    </div>
                `;
            }
        }

        function setupForm() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('form-container').classList.remove('hidden');
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            document.getElementById('todayDate').value = dateStr;
        }

        // ── 圖片選取 & 預覽 ──
        document.getElementById('photoInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            // 壓縮圖片再轉 base64
            compressAndConvert(file, (base64) => {
                // 去掉 data:image/...;base64, 前綴，Make.com toBinary() 需要純 base64
                photoBase64 = base64.split(',')[1];
                const previewImg = document.getElementById('preview-img');
                const placeholder = document.getElementById('upload-placeholder');
                const uploadArea = document.getElementById('photo-upload-area');

                previewImg.src = base64;
                previewImg.style.display = 'block';
                placeholder.style.display = 'none';
                uploadArea.classList.add('has-image');
                document.getElementById('photo-error').classList.add('hidden');
            });
        });

        // 壓縮圖片到最大 1200px，品質 0.75，降低傳輸大小
        function compressAndConvert(file, callback) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const MAX_SIZE = 1200;
                    let w = img.width, h = img.height;
                    if (w > MAX_SIZE || h > MAX_SIZE) {
                        if (w > h) { h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
                        else { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    callback(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ── 表單提交 ──
        const form = document.getElementById('reservationForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 驗證照片
            if (!photoBase64) {
                document.getElementById('photo-error').classList.remove('hidden');
                document.getElementById('photo-upload-area').scrollIntoView({ behavior: 'smooth' });
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner" style="width:24px;height:24px;border-width:3px;"></div>';

            const storeName = document.getElementById('storeName').value;
            const customerPlate = document.getElementById('customerPlate').value.trim().toUpperCase();
            const loanerPlate = document.getElementById('loanerPlate').value.trim().toUpperCase();
            const todayDate = document.getElementById('todayDate').value;

            const payload = {
                userId: document.getElementById('lineUserId').value,
                date: todayDate,
                customerPlate,
                loanerPlate,
                storeName,
                submittedAt: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
                pdfBase64: photoBase64   // Make.com 用 toBinary(1.pdfBase64; "base64") 上傳
            };

            try {
                const response = await fetch(MAKE_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Webhook Error');

                // ── 透過 LIFF 發送卡片確認訊息給客人 ──
                if (liff.isInClient()) {
                    try {
                        await liff.sendMessages([
                            buildConfirmFlexMessage(customerPlate, loanerPlate, storeName, todayDate)
                        ]);
                    } catch (msgErr) {
                        // 若 sendMessages 失敗（例如權限），不中斷整體流程
                        console.warn('sendMessages 失敗', msgErr);
                    }
                }

                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');

            } catch (error) {
                alert('系統傳送失敗，請確認網路連線或稍後再試。');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });

        // ── 建立 Flex Message 卡片 ──
        function buildConfirmFlexMessage(customerPlate, loanerPlate, storeName, date) {
            return {
                type: 'flex',
                altText: '✅ 代步車借出登記完成',
                contents: {
                    type: 'bubble',
                    size: 'mega',
                    header: {
                        type: 'box',
                        layout: 'vertical',
                        backgroundColor: '#2563EB',
                        paddingAll: 'lg',
                        contents: [
                            {
                                type: 'text',
                                text: '✅ 代步車借出登記完成',
                                color: '#FFFFFF',
                                weight: 'bold',
                                size: 'lg',
                                wrap: true
                            }
                        ]
                    },
                    body: {
                        type: 'box',
                        layout: 'vertical',
                        spacing: 'md',
                        paddingAll: 'lg',
                        contents: [
                            buildRow('📅 登記日期', date),
                            buildRow('🚗 原車車牌', customerPlate),
                            buildRow('🔑 代步車車牌', loanerPlate),
                            buildRow('🏪 取車店家', storeName),
                            {
                                type: 'separator',
                                margin: 'md',
                                color: '#E5E7EB'
                            },
                            {
                                type: 'box',
                                layout: 'horizontal',
                                margin: 'md',
                                spacing: 'sm',
                                contents: [
                                    {
                                        type: 'text',
                                        text: '🔒',
                                        size: 'sm',
                                        flex: 0
                                    },
                                    {
                                        type: 'text',
                                        text: '證件照片僅用於借用代步車之身份確認，完成後即予以刪除，請安心。',
                                        size: 'xs',
                                        color: '#6B7280',
                                        wrap: true,
                                        flex: 1
                                    }
                                ]
                            }
                        ]
                    },
                    footer: {
                        type: 'box',
                        layout: 'vertical',
                        paddingAll: 'md',
                        backgroundColor: '#F9FAFB',
                        contents: [
                            {
                                type: 'text',
                                text: '如有疑問請洽門市人員',
                                size: 'xs',
                                color: '#9CA3AF',
                                align: 'center'
                            }
                        ]
                    }
                }
            };
        }

        function buildRow(label, value) {
            return {
                type: 'box',
                layout: 'horizontal',
                spacing: 'sm',
                contents: [
                    {
                        type: 'text',
                        text: label,
                        size: 'sm',
                        color: '#6B7280',
                        flex: 3,
                        wrap: true
                    },
                    {
                        type: 'text',
                        text: value,
                        size: 'sm',
                        color: '#111827',
                        weight: 'bold',
                        flex: 4,
                        align: 'end',
                        wrap: true
                    }
                ]
            };
        }

        window.onload = initializeLiff;
    </script>
</body>
</html>
